# 为 WPF / .NET 编译 ratex-ffi 动态库 (ratex_ffi.dll) + C 头文件 (ratex.h)
#
# FFI 入口 (crates/ratex-ffi/src/lib.rs):
#   RatexResult ratex_parse_and_layout(const char* latex, const RatexOptions* opts)
#   void        ratex_free_display_list(char* json)
#   const char* ratex_get_last_error(void)
#
# 成功时 data 为 UTF-8 JSON DisplayList，见 crates/ratex-ffi/include/ratex.h
# 与 docs/DISPLAYLIST_JSON_PROTOCOL.md
#
# 产物 (Actions Artifacts → ratex-ffi-windows-x64):
#   ratex_ffi.dll
#   ratex.h
#   ratex-ffi-windows-x64.zip

name: Build Windows FFI 1

on:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/workflow.yml"
      - "Cargo.toml"
      - "crates/ratex-ffi/**"
      - "crates/ratex-types/**"
      - "crates/ratex-lexer/**"
      - "crates/ratex-parser/**"
      - "crates/ratex-layout/**"
      - "crates/ratex-font/**"
      - "crates/ratex-katex-fonts/**"
      - "crates/ratex-font-loader/**"
      - "crates/ratex-unicode-font/**"
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/workflow.yml"
      - "Cargo.toml"
      - "crates/ratex-ffi/**"
      - "crates/ratex-types/**"
      - "crates/ratex-lexer/**"
      - "crates/ratex-parser/**"
      - "crates/ratex-layout/**"
      - "crates/ratex-font/**"
      - "crates/ratex-katex-fonts/**"
      - "crates/ratex-font-loader/**"
      - "crates/ratex-unicode-font/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows-x64:
    name: ratex_ffi.dll (x64, MSVC)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable, x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-on-failure: true

      - name: Build ratex-ffi (release)
        run: cargo build --release -p ratex-ffi --target x86_64-pc-windows-msvc

      - name: Test ratex-ffi
        run: cargo test --release -p ratex-ffi --target x86_64-pc-windows-msvc

      - name: Verify exports
        shell: pwsh
        run: |
          $dll = "target/x86_64-pc-windows-msvc/release/ratex_ffi.dll"
          if (-not (Test-Path $dll)) {
            throw "DLL not found: $dll"
          }
          $dumpbin = @(
            "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe",
            "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\Professional\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe",
            "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\Community\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe"
          ) | ForEach-Object { Get-Item $_ -ErrorAction SilentlyContinue } | Select-Object -First 1
          if ($dumpbin) {
            & $dumpbin.FullName /EXPORTS $dll | Select-String "ratex_"
          } else {
            Write-Host "dumpbin not found; skipping export check"
          }
          Get-Item $dll | Format-List Name, Length, FullName

      - name: Package dist
        shell: pwsh
        run: |
          $dist = "dist/ratex-ffi-windows-x64"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/ratex_ffi.dll" $dist/
          Copy-Item "crates/ratex-ffi/include/ratex.h" $dist/
          @"
          RaTeX FFI — Windows x64 (MSVC)
          ==============================

          Files:
            ratex_ffi.dll  — P/Invoke from WPF / .NET (CallingConvention.Cdecl)
            ratex.h        — C struct / function declarations

          WPF usage sketch:
            [DllImport("ratex_ffi", CallingConvention = CallingConvention.Cdecl)]
            static extern RatexResult ratex_parse_and_layout(
                [MarshalAs(UnmanagedType.LPUTF8Str)] string latex,
                ref RatexOptions opts);

            [DllImport("ratex_ffi", CallingConvention = CallingConvention.Cdecl)]
            static extern void ratex_free_display_list(IntPtr json);

            [DllImport("ratex_ffi", CallingConvention = CallingConvention.Cdecl)]
            static extern IntPtr ratex_get_last_error();

          Copy ratex_ffi.dll next to your .exe or add to PATH.
          Layout output is JSON DisplayList — render in WPF from vectors/glyphs.
          "@ | Set-Content -Encoding UTF8 "$dist/README-WPF.txt"
          Compress-Archive -Path "$dist/*" -DestinationPath ratex-ffi-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ratex-ffi-windows-x64
          path: |
            dist/ratex-ffi-windows-x64/ratex_ffi.dll
            dist/ratex-ffi-windows-x64/ratex.h
            dist/ratex-ffi-windows-x64/README-WPF.txt
            ratex-ffi-windows-x64.zip
          if-no-files-found: error

  # 可选：打 tag (v*) 时附带到 GitHub Release，便于 WPF 项目固定版本下载
  release-windows-x64:
    name: GitHub Release (tag)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-windows-x64
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download DLL artifact
        uses: actions/download-artifact@v4
        with:
          name: ratex-ffi-windows-x64
          path: artifact

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifact/ratex-ffi-windows-x64.zip
            artifact/ratex_ffi.dll
            artifact/ratex.h
          generate_release_notes: true
