# 编译 Windows x64 ratex_ffi.dll（含 bitmap 光栅化 + embed-fonts）
#
# 产物 (Actions Artifacts → ratex-ffi-windows-x64):
#   ratex_ffi.dll
#   ratex.h
#   ratex-ffi-windows-x64.zip

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows-ffi:
    name: ratex_ffi.dll (x64, MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          cache-on-failure: true

      - name: Build ratex-ffi (release, embed-fonts)
        run: cargo build --release -p ratex-ffi --features embed-fonts --target x86_64-pc-windows-msvc

      - name: Test ratex-ffi (release, embed-fonts)
        run: cargo test --release -p ratex-ffi --features embed-fonts --target x86_64-pc-windows-msvc

      - name: Verify exports
        shell: pwsh
        run: |
          $dll = "target/x86_64-pc-windows-msvc/release/ratex_ffi.dll"
          if (-not (Test-Path $dll)) {
            throw "DLL not found: $dll"
          }
          $dumpbin = @(
            "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe",
            "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\Professional\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe",
            "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\Community\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe"
          ) | ForEach-Object { Get-Item $_ -ErrorAction SilentlyContinue } | Select-Object -First 1
          if ($dumpbin) {
            $exports = & $dumpbin.FullName /EXPORTS $dll
            $exports | Select-String "ratex_parse_and_layout"
            $exports | Select-String "ratex_render_bitmap"
            $exports | Select-String "ratex_render_png"
            $exports | Select-String "ratex_render_svg"
            $exports | Select-String "ratex_free_bitmap"
            $exports | Select-String "ratex_free_bytes"
          } else {
            Write-Host "dumpbin not found; skipping export check"
          }
          Get-Item $dll | Format-List Name, Length, FullName

      - name: Package dist
        shell: pwsh
        run: |
          $dist = "dist/ratex-ffi-windows-x64"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/ratex_ffi.dll" $dist/
          Copy-Item "crates/ratex-ffi/include/ratex.h" $dist/
          @"
          RaTeX FFI — Windows x64 (MSVC, embed-fonts)
          ===========================================

          Files:
            ratex_ffi.dll  — P/Invoke from WPF / .NET (CallingConvention.Cdecl)
            ratex.h        — C struct / function declarations

          Exported functions:
            ratex_parse_and_layout  — LaTeX -> JSON DisplayList
            ratex_render_bitmap     — LaTeX -> premultiplied RGBA8 (WPF WriteableBitmap)
            ratex_render_png        — LaTeX -> PNG file bytes
            ratex_render_svg        — LaTeX -> standalone SVG UTF-8
            ratex_free_display_list / ratex_free_bitmap / ratex_free_bytes / ratex_free_svg
            ratex_get_last_error

          Bitmap notes:
            - Pixel format: premultiplied RGBA8, stride = width * 4
            - KaTeX fonts are embedded in the DLL (no external fonts/ folder required)
            - Set background_color.a = 0 for transparency
          "@ | Set-Content -Encoding UTF8 "$dist/README-WPF.txt"
          Compress-Archive -Path "$dist/*" -DestinationPath ratex-ffi-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ratex-ffi-windows-x64
          path: |
            dist/ratex-ffi-windows-x64/ratex_ffi.dll
            dist/ratex-ffi-windows-x64/ratex.h
            dist/ratex-ffi-windows-x64/README-WPF.txt
            ratex-ffi-windows-x64.zip
          if-no-files-found: error

  release-windows-ffi:
    name: GitHub Release (tag)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-windows-ffi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ratex-ffi-windows-x64
          path: artifact
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifact/ratex-ffi-windows-x64.zip
            artifact/ratex_ffi.dll
            artifact/ratex.h
          generate_release_notes: true
