name: Build RaTeX Desktop FFI (Windows x64)
on:
  push:
    tags:
      v*
  workflow_dispatch: # 手动触发构建调试

jobs:
  build-desktop-ffi:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装Rust MSVC工具链，仅Windows x64目标，无WASM
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # 仅安装cbindgen，无wasm工具链
      - name: Install cbindgen
        run: cargo install cbindgen --force

      # 修复：PowerShell 单行命令，消除换行符解析错误
      - name: Compile full rendering FFI library
        run: cargo build --release -p ratex-ffi --features embed-fonts --target x86_64-pc-windows-msvc
        env:
          RUSTFLAGS: ""

      # 自动生成完整C头文件（包含所有渲染/内存接口）
      - name: Generate ratex.h (C API header)
        run: cbindgen ./crates/ratex-ffi -o ./ratex.h

      # 打包纯净产物，仅dll+头文件，无wasm/web/cli冗余
      - name: Package artifacts
        run: |
          New-Item -Path ./dist -ItemType Directory -Force
          Copy-Item target/x86_64-pc-windows-msvc/Release/ratex.dll ./dist/
          Copy-Item ./ratex.h ./dist/

      # CI下载缓存
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ratex-windows-desktop-render-ffi
          path: ./dist/

      # 打Tag自动发布Release资产
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
