name: Build RaTeX FFI Windows DLL
on:
  push:
    tags:
      - v*
  workflow_dispatch: # 支持手动触发构建

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # 1. 安装Rust工具链，MSVC目标
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # 2. 安装cbindgen 用于自动生成C头文件
      - name: Install cbindgen
        run: cargo install cbindgen

      # 3. 编译 ratex-ffi 动态库，开启内嵌字体，不静态CRT
      - name: Build ratex-ffi DLL
        run: |
          cargo build --release \
            -p ratex-ffi \
            --features embed-fonts \
            --target x86_64-pc-windows-msvc
        env:
          # 不添加 -C target-feature=+crt-static，使用系统VC运行库
          RUSTFLAGS: ""

      # 4. 生成C头文件 ratex.h
      - name: Generate C header by cbindgen
        run: |
          cbindgen ./crates/ratex-ffi -o ./ratex.h

      # 5. 整理输出产物
      - name: Collect artifacts
        run: |
          New-Item -ItemType Directory -Path ./dist -Force
          Copy-Item target/x86_64-pc-windows-msvc/release/ratex.dll ./dist/
          Copy-Item ratex.h ./dist/

      # 6. 上传制品到CI缓存（可选，调试用）
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ratex-windows-x64-ffi
          path: ./dist/

      # 7. 打Tag时自动上传到Release资产
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
