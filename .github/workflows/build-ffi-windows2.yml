name: Build RaTeX Desktop FFI (Windows x64)
on:
  push:
    tags:
      v*
  workflow_dispatch: # 手动触发构建调试

jobs:
  build-desktop-ffi:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装Rust MSVC工具链，仅Windows x64目标，无WASM目标
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # 仅安装生成C头文件工具，不安装wasm相关编译工具
      - name: Install cbindgen
        run: cargo install cbindgen --force

      # 关键：仅编译ratex-ffi crate，不编译wasm/cli/svg/pdf等无关模块
      # --features embed-fonts：内置KaTeX数学字体，渲染不空白
      # RUSTFLAGS为空：动态依赖VC运行库，不静态链接crt
      - name: Compile full rendering FFI library
        run: |
          cargo build --release \
            -p ratex-ffi \
            --features embed-fonts \
            --target x86_64-pc-windows-msvc
        env:
          RUSTFLAGS: ""

      # 自动生成完整C头文件，包含全部渲染、内存释放函数签名
      - name: Generate ratex.h (C API header)
        run: cbindgen ./crates/ratex-ffi -o ./ratex.h

      # 整理纯净产物：仅dll（完整渲染流）+ 头文件（C#绑定参考）
      - name: Package artifacts
        run: |
          New-Item -Path ./dist -ItemType Directory -Force
          Copy-Item target/x86_64-pc-windows-msvc/Release/ratex.dll ./dist/
          Copy-Item ./ratex.h ./dist/

      # CI缓存，可下载调试
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ratex-windows-desktop-render-ffi
          path: ./dist/

      # 打Tag自动上传Release资产，供WPF项目下载
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
